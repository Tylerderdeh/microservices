spring.application.name=kafka-redis-template

spring.datasource.url=jdbc:postgresql://localhost:5432/kafka_redis
spring.datasource.username=user
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update

spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.enable-idempotence=true
spring.kafka.producer.properties.transactional.id=kafka-redis-tx

spring.kafka.consumer.group-id=kafka-redis-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=org.example.kafka_redis.model
spring.kafka.consumer.properties.isolation.level=read_committed

kafka.topics.main=main-topic
kafka.topics.dlq=main-topic.DLT

idempotency.ttl-seconds=86400
